<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单组件拆解：苹果Tab控件</title>
</head>
<body>

    <!-- 🍎 极简导航栏控件 -->
    <nav class="apple-navbar">
        <div class="nav-content">
            <!-- 我们给每个标签发一张“身份证”(id)，明天用 TypeScript 精准抓取它们 -->
            <a href="#" id="tabMac" class="nav-link">Mac</a>
            <a href="#" id="tabIpad" class="nav-link">iPad</a>
            <a href="#" id="tabIphone" class="nav-link">iPhone</a>
        </div>
    </nav>

    <!-- 核心入口 -->
    <script type="module" src="script.ts"></script>
</body>
</html>
