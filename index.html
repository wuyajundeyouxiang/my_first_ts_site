<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单组件拆解：苹果Tab控件</title>
</head>
<body>
    <!-- 🍎 换成开源无拦截的图标链接 -->
    <nav class="apple-navbar">
        <div class="nav-content">
            <!-- Mac 标签 -->
            <a href="#" id="tabMac" class="nav-link">
                <img src="https://iconify.design" alt="Mac" class="tab-icon">
                <span>Mac</span>
            </a>

            <!-- iPad 标签 -->
            <a href="#" id="tabIpad" class="nav-link">
                <img src="https://iconify.design" alt="iPad" class="tab-icon">
                <span>iPad</span>
            </a>

            <!-- iPhone 标签 -->
            <a href="#" id="tabIphone" class="nav-link">
                <img src="https://iconify.design" alt="iPhone" class="tab-icon">
                <span>iPhone</span>
            </a>
        </div>
    </nav>   
    <!-- 核心入口 -->
    <script type="module" src="script.ts"></script>
</body>
</html>
