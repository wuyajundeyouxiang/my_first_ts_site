<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单组件拆解：苹果Tab控件</title>
    <!-- 强行引入外部样式表，确保任何时候皮肤都能正常加载 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>    
    <!-- 🍎 100% 本地内联 SVG 导航栏控件 -->
    <nav class="apple-navbar">
        <div class="nav-content">
            
            <!-- Mac 标签 -->
            <a href="#" id="tabMac" class="nav-link">
                <!-- 笔记本电脑矢量图标：用代码现场绘制，无限清晰且永不丢失 -->
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="12" rx="2" ry="2"></rect>
                    <line x1="2" y1="20" x2="22" y2="20"></line>
                    <line x1="5" y1="16" x2="19" y2="16"></line>
                </svg>
                <span>Mac</span>
            </a>

            <!-- iPad 标签 -->
            <a href="#" id="tabIpad" class="nav-link">
                <!-- 平板电脑矢量图标 -->
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                </svg>
                <span>iPad</span>
            </a>

            <!-- iPhone 标签 -->
            <a href="#" id="tabIphone" class="nav-link">
                <!-- 智能手机矢量图标 -->
                <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                    <line x1="12" y1="18" x2="12.01" y2="18"></line>
                </svg>
                <span>iPhone</span>
            </a>

        </div>
    </nav>

    <!-- 核心运行大脑：老老实实的普通原生 JS 文件 -->
    <script src="script.js"></script>
</body>
</html>
